services:
  app:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - wiremock
  postgres:
    image: 'postgres:15'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
  redis:
    image: 'redis:7'
    ports:
      - '6379:6379'
  wiremock:
    image: 'wiremock/wiremock:latest'
    ports:
      - '8081:8080'
    volumes:
      - './wiremock/mappings:/home/wiremock/mappings'
